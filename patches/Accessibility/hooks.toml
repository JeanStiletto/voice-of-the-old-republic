# CSWCCreature::PlayFootstep — detour @0x0061a31a. Phase 3 lay-off 5 (Pillar
# 1 stuck-detection via footstep suppression). Replaces the engine's own
# field6_0x20==0 early-out JZ with a handler that combines the engine's
# original check WITH our stuck-suppression decision.
#
# THE WRAPPER-EFLAGS / WRAPPER-EAX BUG (two prior dead-end attempts):
#
#   Attempt 1 (0x0061a30c, cut = MOV EDI,[ESI+0x20] + CMP EDI,EBX):
#     The wrapper appends `TEST EAX, EAX` after the relocated cut bytes
#     to dispatch on the handler's return. That TEST clobbers ZF, which
#     the engine's downstream `JZ +0x312` (0x0061a31a) needed from the
#     cut's CMP. Result: in verdict=0 (don't suppress), EAX=0 → ZF=1 →
#     engine's JZ takes the early-out unconditionally → no audio ever.
#
#   Attempt 2 (0x0061a320, cut = MOV EAX,[ESI+0x21c]):
#     Cut starts with a write to EAX, OVERWRITING the handler's return
#     value before the wrapper's TEST EAX,EAX runs. TEST then tested
#     the appearance pointer (always non-null) → JMP rel32 consumed_exit
#     ALWAYS taken → no audio ever (this time via consume path).
#
#   Both confirmed live 2026-05-06 via per-tick logging — 70+ player
#   verdict=0 events fired but no footsteps were audible.
#
# THIS DESIGN (works around both):
#
#   * Hook AT the engine's JZ itself (0x0061a31a) with `skip_original_bytes
#     = true`. The wrapper emits NO cut bytes, so neither EFLAGS nor EAX
#     gets clobbered by relocated engine code.
#   * The handler emulates the engine's check: read `[ESI+0x20]` itself
#     and return 1 (consume) to mimic the natural early-out. AND adds the
#     stuck-suppression check on top.
#   * `consumed_exit_address = 0x0061a632` — handler return 1 jumps to the
#     same destructor cascade the engine's JZ would have taken.
#   * Natural fall-through (handler return 0) lands at 0x0061a31a + 6 =
#     0x0061a320, exactly where engine flow continues for the "play audio"
#     case. The first instruction there is `MOV EAX, [ESI+0x21c]` which
#     immediately overwrites the wrapper's leftover EAX=0, so the engine
#     doesn't notice.
#
# Bytes at 0x0061a31a (DumpBytes — provided for the framework's natural-
# resume size calculation only; not emitted because skip_original_bytes):
#   0f 84 12 03 00 00       JZ +0x312 → 0x0061a632
#
# Stack / register state at hook entry: ESI = `this` (set by `MOV ESI, ECX`
# at 0x0061a2f1, callee-saved across both CExoString constructor calls AND
# the engine's MOV+CMP+MOV+MOV at 0x0061a30c-0x0061a316). EAX,ECX,EDX,EFLAGS
# are caller-clobbered — handler ignores them.
#
# Framework upstream-PR opportunity: the wrapper's TEST EAX,EAX should be
# wrapped in PUSHFD/POPFD so cut bytes' flags survive — see
# docs/upstream-prs.md.
[[hooks]]
address = 0x0061a31a
type = "detour"
function = "OnPlayFootstep"

original_bytes = [0x0f, 0x84, 0x12, 0x03, 0x00, 0x00]

skip_original_bytes = true
exclude_from_restore = ["eax"]
consumed_exit_address = 0x0061a632

[[hooks.parameters]]
source = "esi"
type = "pointer"

# CExoSound::SetListenerPosition @0x005d5df0 — Phase 4 lay-off 4 rework.
# The per-frame camera-driven listener write goes through this function
# (single xref from CClientExoAppInternal::UpdateSoundEngine at
# 0x005f5626). Without this detour, our OnUpdate-time listener writes
# from view_mode::Tick get stomped within one tick — verified at lay-off
# 4 by the throwaway probe (`survived=0` every iteration). Detouring
# the camera-driven write site itself is the only design that wins the
# race against the engine's render-phase update.
#
# Bytes from DumpBytes 2026-05-06 (function = 14 bytes total):
#   0x5d5df0: 8b 09              MOV  ECX, [ECX]
#   0x5d5df2: 85 c9              TEST ECX, ECX
#   0x5d5df4: 74 05              JZ   +5  -> 0x5d5dfb
#   0x5d5df6: e9 05 08 00 00     JMP  CExoSoundInternal::SetListenerPosition
#   0x5d5dfb: c2 04 00           RET  4
#
# Hook shape: skip_original_bytes=true at function entry; handler
# replicates the body (null-check + dispatch to inner @0x5d6600) but
# substitutes view_mode's cursor position for the Vector arg when view
# mode is active. consumed_exit_address = 0x5d5dfb (the natural RET 4)
# so the function's stack convention is preserved and we never let the
# (advisory) cut bytes execute. Avoids relocating the rel8 JZ + rel32
# JMP that would otherwise sit in the cut.
#
# Cut-byte advisory: the JZ + JMP make up the engine's body; we declare
# 6 bytes (MOV+TEST+JZ) so the wrapper sizes the natural-resume hop
# correctly even though we always consume.
#
# Calling convention: __thiscall, ECX = this (CExoSound*), [ESP+4] =
# Vector* param_1. The esp+4 source emits LEA per
# project_kpatchmanager_lea_bug.md — handler dereferences once to
# recover the actual Vector*.
[[hooks]]
address = 0x005d5df0
type = "detour"
function = "OnSetListenerPosition"

original_bytes = [0x8b, 0x09, 0x85, 0xc9, 0x74, 0x05]

skip_original_bytes = true
exclude_from_restore = ["eax"]
consumed_exit_address = 0x005d5dfb

[[hooks.parameters]]
source = "ecx"
type = "pointer"

[[hooks.parameters]]
source = "esp+4"
type = "pointer"

# CSWGuiListBox::HandleLMouseDown @0x0041c4a0 — DISABLED. Even when this hook
# never fires (no mouse click occurred), its mere installation causes the
# title-screen panel to oscillate focus on every arrow press: arrow press
# moves focus to next button, then HandleFocusChange(p1=1) fires on the OLD
# button, then SetActiveControl reverts focus back. Same symptom appears
# when LMouseUp or ListBox::HandleInputEvent are installed at function entry,
# whether singly or together. The pre-existing CSWGuiListBox::SetActiveControl
# hook at 0x0041c16b (mid-function +0xb) does NOT cause oscillation. Pattern:
# entry-point hooks on CSWGuiListBox are toxic; mid-function hooks are fine.
# When re-enabling, redesign to hook mid-function with a register source
# (see feedback_hook_design_register_sources.md).
