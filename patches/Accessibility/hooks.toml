type = "pointer"


# CSWSCombatRound::RemoveLastAction @0x004d37b0 — pops the tail of the
# CSWSCombatRound.actions linked list. If we see this fire between
# user presses, the engine is silently culling queued entries one at
# a time (different from RemoveAllActions which nukes the whole list).
#
# Function entry per DumpBytes 2026-05-28:
#   0x004d37b0: 8b 89 b0 09 00 00   MOV  ECX, [ECX+0x9B0]  ; ECX = this->actions
#   0x004d37b6: 33 c0                XOR  EAX, EAX
#   0x004d37b8: 85 c9                TEST ECX, ECX
#   0x004d37ba: 74 20                JZ short +0x20
#
# Cut: 6 bytes — just the MOV. The wrapper preserves ECX across the
# handler call (thiscall ABI), then runs the cut which clobbers ECX
# with this->actions. Resume at 0x4d37b6 (XOR EAX,EAX) sets EAX=0;
# then TEST ECX,ECX inspects the loaded list ptr; JZ branches if null.
# All EFLAGS-modifying instructions are in engine code post-cut, so
# the wrapper's own EFLAGS use can't corrupt the JZ.
#
# At hook entry:
#   ECX = this (CSWSCombatRound*)  — only argument
[[hooks]]
address = 0x004d37b0
type = "detour"
function = "OnCombatRoundRemoveLastAction"

original_bytes = [0x8b, 0x89, 0xb0, 0x09, 0x00, 0x00]

skip_original_bytes = false
exclude_from_restore = []

[[hooks.parameters]]
source = "ecx"
type = "pointer"
