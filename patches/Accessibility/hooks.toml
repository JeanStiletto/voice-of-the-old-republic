# CSWSCombatRound::SetCurrentAction @0x004d2b40 — moves an action into
# the "currently dispatching" slot at this+0x9D0. Fires once per action
# the engine picks to execute. If the queue chains 5 entries but only
# 1 SETCUR fires per round, that's the per-round consumer rate.
#
# Function body per DumpBytes 2026-05-28 — small leaf:
#   0x004d2b40: 8a 44 24 04         MOV  AL, [ESP+4]      ; byte param
#   0x004d2b44: 88 81 d0 09 00 00   MOV  [ECX+0x9D0], AL  ; this->current_action = byte
#   0x004d2b4a: c2 04 00            RET 4
