# can be identified by frequency-bucketing fs_* resrefs. Run 2026-05-06
# pinned 0x0061a5b6 (inside CSWCCreature::PlayFootstep) as THE caller; the
# OnPlayFootstep hook below uses that result. Re-enable for any future
# audio-path RE; keep disabled in normal builds (~250 fires/sec spams the
# log).
#
# [[hooks]]
# address = 0x005D5E16
# type = "detour"
# function = "OnPlay3DOneShotSound"
# original_bytes = [0x8b, 0x44, 0x24, 0x28, 0xd9, 0x44, 0x24, 0x10]
