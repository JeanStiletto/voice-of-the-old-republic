# (arrow-key navigation, mouse click, programmatic SetActiveControl). Unlike
# CSWGuiControl::HandleFocusChange (which fires twice per navigation — loses
# and gains — and is bypassed by the title screen entirely), SetActiveControl
# is the single canonical signal we want for screen-reader announcements.
#
# Function entry (0x0040a630) per Lane's SARIF:
#   void __thiscall CSWGuiPanel::SetActiveControl(CSWGuiControl* param_1)
#
# Bytes from 0x0040a630 (DumpBytes.java):
#   56              push  esi
#   8b 74 24 08     mov   esi, [esp+8]    ; param_1 → esi
#   57              push  edi
#   8b f9           mov   edi, ecx        ; this    → edi
#   8b 4f 1c        mov   ecx, [edi+0x1c] ; ← hook here, both args populated
#   3b ce           cmp   ecx, esi
#
# Cut at 5 bytes: MOV (3) + CMP (2). Both register/memory-relative — safe to
# relocate. EDI/ESI are callee-saved so they survive the handler call; the
# flags set by the relocated CMP feed the JZ at 0x0040a63d on the way back.
#
# Note: param_1 may be NULL (panel deactivating its current selection); we
# handle that in the handler and just skip speaking.
[[hooks]]
