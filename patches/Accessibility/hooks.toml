# All four were toxic at the entry point. Even when a hook never fired (no
# matching event during the session), the mere installation caused the title-
# screen panel to oscillate focus on every arrow press: arrow press moves
# focus to the next button, then HandleFocusChange(p1=1) fires on the OLD
# button, then SetActiveControl reverts focus back. SetSelectedControl
# additionally has a 10-byte cut requirement spanning a 16-bit-register MOV AX
# that broke input dispatch entirely. The pre-existing mid-function hook on
# SetActiveControl @0x0041c16b (+0xb past the entry) does NOT cause
# oscillation.
#
# Lesson: entry-point hooks on CSWGuiListBox are unsafe. Any re-enable must
# redesign as a mid-function hook with a register source per
# feedback_hook_design_register_sources.md. The handlers + DumpListBoxState
# helper were removed from menus.cpp in this audit; resurrecting them means
# writing fresh handlers around the redesigned cut, not restoring the old
# entry-point shape.

# CClientExoAppInternal::ProcessInput @ 0x006227e0 — frame entry marker.
# Per-frame call site that pulls events from CExoInput and dispatches them
# to either the upstream client-app HandleInputEvent or the manager
# HandleInputEvent based on routing rules in
# docs/in-game-menu-input-investigation.md. Hooking here gives us a frame
# delimiter that lets the input log distinguish "two events in one frame"
# from "two events across two frames" — the open question for the
# held-Esc repeat-press hypothesis (Q2 in the doc).
#
# Function entry @ 0x006227e0 has SEH frame setup + 0x114 of locals (too
# big and contains absolute addresses to safely cut). We hook AFTER the
# SEH+locals are in place at 0x006227fb, where the register-save sequence
# is starting. ECX still holds `this` because nothing between function
# entry and 0x006227fb writes ECX (the FS:[0] / SUB ESP / SEH register
# operations are all stack/segment-relative).
#
# Bytes from 0x006227fb (DumpBytes 2026-05-10):
#   0x006227fb: 53           PUSH EBX
#   0x006227fc: 55           PUSH EBP
#   0x006227fd: 56           PUSH ESI
#   0x006227fe: 8b f1        MOV  ESI, ECX     ; this → esi
#   0x00622800: 33 db        XOR  EBX, EBX     ; (post-cut)
#
# Cut: 5 bytes covering PUSH EBX + PUSH EBP + PUSH ESI + MOV ESI,ECX. All
# register-only, position-independent — relocates cleanly.
[[hooks]]
address = 0x006227fb
type = "detour"
function = "OnProcessInput"

original_bytes = [0x53, 0x55, 0x56, 0x8b, 0xf1]

skip_original_bytes = false
exclude_from_restore = []

[[hooks.parameters]]
source = "ecx"
type = "pointer"

