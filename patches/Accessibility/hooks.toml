# ============================================================================
# Combat-queue diagnostic probe.
#
# Hooks the deterministic mutators on CSWSCombatRound so we can answer
# "did the queue chain or overwrite?" without racing the engine. Each fire
# logs a Combat.Diag line tagged ADD or CLEAR with role=PLAYER/other.
# Filter the patch log with `grep "Combat.Diag.*PLAYER"` to see only the
# user's combat round.
#
# These hooks are read-only — handlers do not mutate engine state, just
# log. Safe to leave in across builds; remove once the chain-vs-overwrite
# question is settled.
# ============================================================================

# CSWSCombatRound::AddAction @0x004d3660 — generic queue adder. Every
# specialized adder (AddAttackAction / AddSWSpellAction / ...) calls this.
# Confirmed call sites (FindCallers): five sites in 0x4d3xxx — all
# specialized adders forwarding here.
#
# Function entry per DumpBytes 2026-05-28:
#   0x004d3660: 53                 PUSH EBX
#   0x004d3661: 56                 PUSH ESI
#   0x004d3662: 8b f1               MOV  ESI, ECX            ; this
#   0x004d3664: 8b 86 b0 09 00 00  MOV  EAX, [ESI+0x9B0]    ; this->actions
#   0x004d366a: 85 c0               TEST EAX, EAX
#   0x004d366c: 57                 PUSH EDI
#
# Cut: 10 bytes (PUSH EBX + PUSH ESI + MOV ESI,ECX + MOV EAX,[ESI+0x9B0]).
# Register-only + memory-relative; clean to relocate. After cut runs:
# ESI=this, EAX=this->actions. Resume at 0x4d366a (TEST EAX,EAX) uses the
# EAX value the cut just loaded.
#
# At hook entry (BEFORE cut runs):
#   ECX     = this (CSWSCombatRound*)
#   [ESP+0] = return addr
#   [ESP+4] = action (CSWSCombatRoundAction*)
#   [ESP+8] = param_2 (int)
#
# `source = "esp+N"` emits LEA per project_kpatchmanager_lea_bug.md;
# handler dereferences once to recover the slot value.
[[hooks]]
address = 0x004d3660
type = "detour"
function = "OnCombatRoundAddAction"

original_bytes = [0x53, 0x56, 0x8b, 0xf1, 0x8b, 0x86, 0xb0, 0x09, 0x00, 0x00]

skip_original_bytes = false
exclude_from_restore = []

[[hooks.parameters]]
