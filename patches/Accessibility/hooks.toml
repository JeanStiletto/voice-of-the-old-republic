# CExoSoundSourceInternal::CalculatePitchVarianceFrequency @0x005db3d0 —
# pitch-variance neutraliser, scoped to our own Play*OneShotSound calls.
# The engine applies a per-fire random pitch shift to every sound source
# (anti-repetition cosmetic) which degrades accessibility-cue
# localisation: HRTF response is frequency-dependent, so jittered pitch
# shifts the perceived spatial cue from one fire to the next, and breaks
# the per-cue timbre identification (Wall vs Door vs Item) the user
# relies on. We replace the function with one that returns
# this->base_frequency unchanged — but only when the calling thread is
# inside a BeginScopedZero / EndScopedZero window (set by audio_bus's
# PlayCue / PlayCue3D wrappers). Other engine sounds (footsteps, sword
# swings, GUI clicks the engine itself triggers, dialogue, ambient
# one-shots, mid-playback chorus on the audio thread) keep their
# jitter — the handler returns 0 in those cases and falls through to
# the original function.
#
# Bytes from runtime DumpBytes 2026-05-07 (function body 125 bytes):
#   0x005db3d0: 51              PUSH ECX        ; allocate 4-byte local
#   0x005db3d1: 56              PUSH ESI
#   0x005db3d2: 57              PUSH EDI
#   0x005db3d3: 8b f1           MOV  ESI, ECX   ; ESI = this
#   0x005db3d5: e8 6d 10 12 00  CALL random()
#   ... (FPU multiply by [ESI+0x74] pitch_variance + base_frequency-
#        derived bias; updates [ESI+0x54] pitch_variance_frequency) ...
#   0x005db449: 5f              POP EDI         ; ← shared epilogue
#   0x005db44a: 5e              POP ESI
#   0x005db44b: 59              POP ECX
#   0x005db44c: c3              RET
#
# Hook design (skip_original_bytes=false, consumed-exit pattern):
#   * 5-byte cut at function entry: PUSH ECX; PUSH ESI; PUSH EDI; MOV
#     ESI, ECX. None of those depend on flags or use rel-offsets, so
#     they relocate cleanly into the wrapper.
#   * exclude_from_restore = ["eax"] so the handler's int return reaches
#     the wrapper's `TEST EAX,EAX; JZ +5; JMP rel32 consumed_exit`
#     dispatch.
#   * consumed_exit_address = 0x005db449 (epilogue) — pops the 12 bytes
#     the cut just pushed and RETs with EAX still holding base_frequency.
#   * Handler returns 0 to fall through to the original function when
#     the scope flag is clear, OR returns base_frequency (or 1 in the
#     edge-cases of null-this / read-fault) to consume when the flag is
#     set.
#
# Scope: per-call, via thread_local depth counter in audio_pitch.cpp.
# Only sources the engine creates synchronously on a thread that is
# currently inside our PlayCue / PlayCue3D wrappers get jitter
# neutralised. Every other engine sound — including engine-driven plays
# of the same gui_* resrefs — keeps its jitter.
[[hooks]]
address = 0x005db3d0
type = "detour"
function = "OnCalculatePitchVarianceFrequency"

original_bytes = [0x51, 0x56, 0x57, 0x8b, 0xf1]

skip_original_bytes = false
exclude_from_restore = ["eax"]
consumed_exit_address = 0x005db449

[[hooks.parameters]]
source = "ecx"
type = "pointer"

# CGuiInGame::SwitchToSWInGameGui — detour at 0x0062cf2d (mid-function,
# 5-byte cut). This is the engine's universal sub-screen-open primitive:
# called by strip icon onClicks, in-game keymap hotkeys (M for Map, I for
# Inventory, etc.), and any other engine path that opens an InGame*
# sub-screen. Detouring here gives us a single cleanup site that covers
# every entry path uniformly.
#
# Why we detour: when a sub-screen is already open and the user invokes a
# different one, SwitchToSWInGameGui does NOT pop the previous panel — it
# just pushes the new one on top. For most sub-screens (Map, Equip, …)
# the natural close-button path eventually pops them; InGameOptions in
# particular has an OnQuit handler at 0x006ab1b0 that reorders panels[]
# without actually popping, so Options accumulates as undead-in-stack
# across multiple drills. Our handler calls PrevSWInGameGui (the engine's
# own dual at 0x0062cdf0) to pop any active sub-screen BEFORE the original
# SwitchToSWInGameGui runs, so the new one lands on a clean panels[].
#
# Function entry (0x0062cf10) per Lane's SARIF:
#   void __thiscall SwitchToSWInGameGui(int GUI_id)
#
# Bytes from the running process (Steam .exe is DRM-encrypted on disk so
# the dump came via OpenProcess/ReadProcessMemory at runtime; the .gzf
# would yield the same):
#   0x0062cf10: 64 a1 00 00 00 00       MOV  EAX, FS:[0]      ; SEH frame
#   0x0062cf16: 6a ff                   PUSH 0xffffffff
#   0x0062cf18: 68 28 93 72 00          PUSH 0x00729328       ; SEH handler
#   0x0062cf1d: 50                      PUSH EAX
#   0x0062cf1e: 64 89 25 00 00 00 00    MOV  FS:[0], ESP
#   0x0062cf25: 83 ec 08                SUB  ESP, 8
#   0x0062cf28: 53                      PUSH EBX
#   0x0062cf29: 8b 5c 24 1c             MOV  EBX, [ESP+0x1c]  ; EBX = GUI_id
#   0x0062cf2d: 85 db                   TEST EBX, EBX         ← hook here
#   0x0062cf2f: 56                      PUSH ESI
#   0x0062cf30: 8b f1                   MOV  ESI, ECX         ; ESI = this
#   0x0062cf32: 0f 8c f4 00 00 00       JL   +0xf4             (rel32 — must
#                                                                stay outside
#                                                                cut)
#
# Cut: TEST EBX,EBX (2) + PUSH ESI (1) + MOV ESI,ECX (2) = 5 bytes. All
# register-only, position-independent — relocates cleanly. We hook AFTER
# the engine has loaded GUI_id into EBX (so we can capture it from a
# register source rather than [ESP+4] which is subject to the framework's
# LEA-vs-MOV stack-param bug, see project_kpatchmanager_lea_bug.md).
#
# At hook entry: ECX = this (still — nothing in the prologue writes ECX),
# EBX = GUI_id. Both register-sourced.
[[hooks]]
address = 0x0062cf2d
type = "detour"
function = "OnSwitchToSWInGameGui"

original_bytes = [0x85, 0xdb, 0x56, 0x8b, 0xf1]

skip_original_bytes = false
exclude_from_restore = []

[[hooks.parameters]]
source = "ecx"
type = "pointer"

[[hooks.parameters]]
source = "ebx"
type = "int"

