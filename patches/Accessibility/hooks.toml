# Minimal infrastructure-test detour: CSWRules::CSWRules constructor.
# Address and original-bytes signature borrowed from upstream LevelUpLimit,
# which declares kotor1_steam_103 in its supported_versions — so this address
# has been validated against the Steam binary.
#
# We don't modify rules behavior. skip_original_bytes = false so the
# wrapper executes the original 10-byte init sequence after our handler
# returns, leaving game logic untouched.
[[hooks]]
address = 0x00552c9a
type = "detour"
function = "OnRulesInit"

# 8d 7e 38              LEA EDI, [ESI+0x38]
# b9 15 00 00 00        MOV ECX, 0x15
# f3 ab                 REP STOSD
original_bytes = [0x8d, 0x7e, 0x38, 0xb9, 0x15, 0x00, 0x00, 0x00, 0xf3, 0xab]

skip_original_bytes = false
exclude_from_restore = []

# CSWRules* this — passed for completeness; handler ignores it for now.
[[hooks.parameters]]
source = "esi"
type = "pointer"

# CSWGuiControl::HandleFocusChange — hooked mid-function at 0x41896b, after
# the engine has loaded param_1 into EAX and 'this' into EDI. We deliberately
# skip the function-entry hook to avoid the framework's stack-param feature,
# which has a known LEA-vs-MOV bug (gives addresses instead of values; see
# ../../docs/llm-docs/re/ + memory).
#
# This hook lands AFTER the entry-time `JZ +0x31` that handles the
# "param_1 == 0" branch, so we only see "focus gained" / non-zero param_1
# events. Sufficient for first-fire validation.
#
# Bytes from Lane's Ghidra database via tools/ghidra-scripts/DumpBytes.java.
# Cut at 5 bytes: MOV ECX, [EDI+0x34] (3) + TEST ECX, ECX (2). Both register/
# memory-relative — safe to relocate. GoG bytes match Steam at this address.
#
# Signature per Ghidra: void __thiscall HandleFocusChange(int param_1).
[[hooks]]
address = 0x0041896b
type = "detour"
function = "OnHandleFocusChange"

# 8b 4f 34              MOV  ECX, [EDI+0x34]   ; reads via 'this' (EDI)
# 85 c9                 TEST ECX, ECX
original_bytes = [0x8b, 0x4f, 0x34, 0x85, 0xc9]

skip_original_bytes = false
exclude_from_restore = []

[[hooks.parameters]]
source = "edi"
type = "pointer"

[[hooks.parameters]]
source = "eax"
type = "int"

# CSWGuiPanel::SetActiveControl — hooked mid-function at 0x0040a638. This is
# THE panel-level entry point for focus change: called once per actual change
# (arrow-key navigation, mouse click, programmatic SetActiveControl). Unlike
# CSWGuiControl::HandleFocusChange (which fires twice per navigation — loses
# and gains — and is bypassed by the title screen entirely), SetActiveControl
# is the single canonical signal we want for screen-reader announcements.
#
# Function entry (0x0040a630) per Lane's SARIF:
#   void __thiscall CSWGuiPanel::SetActiveControl(CSWGuiControl* param_1)
#
# Bytes from 0x0040a630 (DumpBytes.java):
#   56              push  esi
#   8b 74 24 08     mov   esi, [esp+8]    ; param_1 → esi
#   57              push  edi
#   8b f9           mov   edi, ecx        ; this    → edi
#   8b 4f 1c        mov   ecx, [edi+0x1c] ; ← hook here, both args populated
#   3b ce           cmp   ecx, esi
#
# Cut at 5 bytes: MOV (3) + CMP (2). Both register/memory-relative — safe to
# relocate. EDI/ESI are callee-saved so they survive the handler call; the
# flags set by the relocated CMP feed the JZ at 0x0040a63d on the way back.
#
# Note: param_1 may be NULL (panel deactivating its current selection); we
# handle that in the handler and just skip speaking.
[[hooks]]
address = 0x0040a638
type = "detour"
function = "OnSetActiveControl"

original_bytes = [0x8b, 0x4f, 0x1c, 0x3b, 0xce]

skip_original_bytes = false
exclude_from_restore = []

[[hooks.parameters]]
source = "edi"
type = "pointer"

[[hooks.parameters]]
source = "esi"
type = "pointer"

# CSWGuiManager::HandleInputEvent — hooked mid-function at 0x0040c907.
# This is the GUI manager's central input dispatcher: every keyboard / mouse
# event the engine routes to any GUI surface passes through this function
# before being virtual-dispatched to the active panel's per-class override.
# By hooking here we capture input on EVERY screen with one hook (title menu,
# Options, chargen, in-game menus, dialog, save/load, etc.) — the previous
# CSWGuiMainMenu::HandleInputEvent hook only saw title-screen events.
#
# We hook BEFORE the entry-time `JZ +0xdf` that handles `param_2 == 0`, so we
# see both press AND release edges. param_2 is logged as `val=` so press vs
# release is obvious in the log.
#
# Function entry (0x0040c8e0) per Lane's SARIF:
#   void __thiscall HandleInputEvent(int param_1, int param_2)
#
# Bytes from 0x0040c8e0 (DumpBytes.java):
#   6a ff 64 a1 00 00 00 00 68 58 48 71 00     ; SEH frame setup
#   50                                          ; PUSH EAX (saves frame ptr)
#   8b 44 24 14                                 ; MOV EAX, [ESP+0x14]   param_2
#   64 89 25 00 00 00 00                        ; install SEH handler
#   83 ec 14                                    ; SUB ESP, 0x14
#   53                                          ; PUSH EBX
#   8b 5c 24 28                                 ; MOV EBX, [ESP+0x28]   param_1
#   55 56 33 ed 3b c5                           ; PUSH EBP, PUSH ESI, XOR EBP,EBP, CMP EAX,EBP
#   8b f1 57 89 5e 68                           ← hook here, 6 bytes
#   0f 84 df 00 00 00                           ; JZ +0xdf (param_2 == 0)
#
# At hook entry:
#   ECX = this  (pre-MOV-ESI-ECX, still in ECX)
#   EBX = param_1  (loaded at 0x0040c8fd)
#   EAX = param_2  (loaded at 0x0040c8ee, untouched since CMP EAX,EBP)
#
# Cut covers MOV ESI,ECX (2) + PUSH EDI (1) + MOV [ESI+0x68],EBX (3) = 6 bytes.
# All three instructions are register/memory-relative — safe to relocate. The
# wrapper saves callee-clobbered registers around our handler call, then runs
# the cut bytes, then resumes at 0x0040c90d for the JZ.
# Selective consumption: when OnHandleInputEvent returns non-zero (arrow key
# we've handled), the wrapper jumps to the function epilogue at 0x0040cbcb
# instead of continuing into the engine's translation + dispatch path. This
# stops the engine from firing its broken `.gui` focus cycle for arrow keys
# while leaving every other key (Tab, Enter, mouse, etc.) untouched.
# `eax` excluded from POPAD so the handler's return value reaches the wrapper's
# TEST EAX, EAX. Stack state at the consumed-exit target matches stack state
# at the natural fall-through (cut bytes are register-only — no net delta).
[[hooks]]
address = 0x0040c907
type = "detour"
function = "OnHandleInputEvent"

original_bytes = [0x8b, 0xf1, 0x57, 0x89, 0x5e, 0x68]

skip_original_bytes = false
exclude_from_restore = ["eax"]
consumed_exit_address = 0x0040cbcb

[[hooks.parameters]]
source = "ecx"
type = "pointer"

[[hooks.parameters]]
source = "ebx"
type = "int"

[[hooks.parameters]]
source = "eax"
type = "int"

# CSWGuiManager::Update — hooked mid-function at 0x0040ce76. Per-frame tick
# from CClientExoAppInternal::MainLoop @ 0x602eb0 (one call per frame, after
# input dispatch). Used as a deferred-call site for chain-navigation cursor
# moves: calling MoveMouseToPosition from inside OnHandleInputEvent would
# re-enter the manager's input plumbing while it's mid-dispatch. Update runs
# AFTER dispatch every frame, so its body iterates panels safely while we
# trigger HitCheckMouse / UpdateMouseOverControl from our handler.
#
# Function entry (0x0040ce70) per Lane's SARIF disassembly:
#   0x40ce70: 51                     push ecx           ; local var slot
#   0x40ce71: 53                     push ebx
#   0x40ce72: 55                     push ebp
#   0x40ce73: 56                     push esi
#   0x40ce74: 8b e9                  mov  ebp, ecx      ; this → ebp
#   0x40ce76: 8b 85 8c 00 00 00      mov  eax, [ebp+0x8c]   ← hook here, 6 bytes
#   0x40ce7c: 57                     push edi
#
# Cut at 6 bytes covers a single memory-relative MOV that loads a panel-list
# field. The instruction is position-independent → safe to relocate. EBP
# holds the manager pointer at hook entry (loaded two instructions earlier
# by `mov ebp, ecx`, callee-saved across our handler call).
[[hooks]]
address = 0x0040ce76
type = "detour"
function = "OnUpdate"

original_bytes = [0x8b, 0x85, 0x8c, 0x00, 0x00, 0x00]

skip_original_bytes = false
exclude_from_restore = []

[[hooks.parameters]]
source = "ebp"
type = "pointer"

# CServerExoApp::SetMoveToModuleString — hooked at function entry @0x004aecd0.
# Captures the destination module name (CExoString*) at the start of the
# area-transition pipeline. Per investigation Q-area-transitions, the engine
# fires:
#   SetMoveToModulePending(1) → SetMoveToModuleString(dest_resref)
#   → SetMoveToModuleStartWaypoint(wp) → AddMoveToModuleMovie(movie)
# all BEFORE the loading screen renders. Hooking the second of these gives us
# the destination resref (e.g. "endar_spire", "tar_m02ac") in time to queue a
# "Lade: …" / "Loading: …" announce ahead of the load.
#
# Function entry (0x004aecd0) per Lane's SARIF:
#   void __thiscall SetMoveToModuleString(CExoString* param_1)
#
# Bytes from 0x004aecd0 (DumpBytes 2026-05-04):
#   8b 49 04                   mov ecx, [ecx+4]       ; this->internal
#   81 c1 84 00 01 00          add ecx, 0x10084       ; → CExoString field
#   e9 72 6f 13 00             jmp CExoString::operator=
#
# Cut: 9 bytes covering the MOV (3) + ADD (6). Both register-relative — safe
# to relocate. After our handler, the wrapper executes the cut bytes (so ECX
# gets transformed to the inner CExoString pointer) then resumes at 0x004aecd9
# which is the JMP into CExoString::operator=. Function flow undisturbed.
#
# Parameters at hook entry (BEFORE the cut bytes execute):
#   ECX = CServerExoApp*  (the public 8-byte facade — unmodified)
#   [ESP+4] = CExoString* (the destination module name)
#
# **Stack-param caveat (per memory project_kpatchmanager_lea_bug.md):** the
# upstream wrapper emits LEA (not MOV) for `source = "esp+X"` parameters, so
# the handler receives the *address* of the stack slot, not its value. The
# handler dereferences once to get the actual CExoString*. Documented in
# OnSetMoveToModuleString itself.
[[hooks]]
address = 0x004aecd0
type = "detour"
function = "OnSetMoveToModuleString"

original_bytes = [0x8b, 0x49, 0x04, 0x81, 0xc1, 0x84, 0x00, 0x01, 0x00]

skip_original_bytes = false
exclude_from_restore = []

[[hooks.parameters]]
source = "ecx"
type = "pointer"

[[hooks.parameters]]
source = "esp+4"
type = "pointer"

