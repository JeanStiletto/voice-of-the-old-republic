type = "detour"
function = "OnSetListenerPosition"

original_bytes = [0x8b, 0x09, 0x85, 0xc9, 0x74, 0x05]

skip_original_bytes = true
exclude_from_restore = ["eax"]
consumed_exit_address = 0x005d5dfb

[[hooks.parameters]]
