# kdev project configuration
#
# All paths may be absolute or relative to this file's directory.
# kdev walks upward from the cwd to find this file.

[game]
# KOTOR 1 install root. The 'swkotor.exe' inside this directory is the build target.
install = 'C:\Program Files (x86)\Steam\steamapps\common\swkotor'

[patch_manager]
# Runtime release layout for LaneDibello/Kotor-Patch-Manager.
# kdev consumes <release>/bin/KotorPatcher.dll (the injected runtime) and
# <release>/patches/*.kpatch (bundled additional patches) at apply time.
# This holds our rebuilt 0.6.0 KotorPatcher.dll (KPM 0.6.0 base + our PR-1/3/4/5)
# plus the 0.6.0 AddressDatabases. KPatchCore itself is compiled from the
# vendored source under [upstream].clone via kdev.csproj's project reference.
release = 'C:\Tools\KotorPatchManager-v0.6.0'

[upstream]
# Source clone of the patch manager. Used by 'kdev build' to set up the layout
# create-patch.bat expects (Patches/Common/ and lib/ siblings).
clone = 'third_party/Kotor-Patch-Manager'

[accessibility]
# Our patch source directory.
source = 'patches/Accessibility'
# Where built .kpatch artifacts land.
build_output = 'build'
# The patch's id, must match manifest.toml's [patch].id field.
patch_id = 'accessibility'
# Additional patch IDs to install alongside ours on every 'kdev apply'. These
# must already exist as .kpatch files inside <patch_manager.release>/patches/.
#
# Currently EMPTY on purpose. The old 'widescreen' patch was deleted upstream in
# 0.6.0; its intended replacement 'borderless_fullscreen' turns out to be a
# STATIC exe byte-patch, which cannot apply to the Steam release — SteamStub
# encrypts .text on disk, so the byte-verify fails (confirmed 2026-07-21: hook
# at 0x0044DC0C expected [BE 00 00 CF 02], got ciphertext), and because the
# install is one transaction it aborts our runtime accessibility patch too.
# This is the same Steam static-hook wall documented for J0-o/KotorUniResPatch's
# Resolution Unlocker — see docs/unified-resolution-patch-compatibility.md. Our
# own patch is all runtime detours, so it applies on Steam alone. Revisit the
# screen-patch story (runtime resolution-unlock / K1 DeSteamify) separately.
#
# '4gb-patch' also intentionally not listed: its manifest declares a different
# Steam SHA than ours and the applicator rejects it.
additional_patches = []

# [re] — reverse-engineering assets consumed by `kdev re`. ALL OPTIONAL: the
# defaults below (shown commented) match docs/tools.md, so on the canonical
# setup `kdev re` works with no config here. Override any key if your paths differ.
# [re]
# sarif               = 'docs/llm-docs/re/k1_win_gog_swkotor.exe.sarif'  # Lane's SARIF export
# jq                  = 'jq'                                             # bare name = resolved via PATH
# ghidra_headless     = 'C:\Tools\ghidra_12.0.4_PUBLIC\support\analyzeHeadless.bat'
# ghidra_project_dir  = 'C:\Tools\ghidra-projects'
# ghidra_project_name = 'kotor1'
# ghidra_program      = 'k1_win_gog_swkotor.exe'
# ghidra_scripts      = 'tools/ghidra-scripts'                           # holds Decompile.java
