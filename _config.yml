title: Voice of the Old Republic
description: A screen-reader accessibility mod for Star Wars Knights of the Old Republic 1 that lets blind players play with any modern screen reader.
theme: jekyll-theme-cayman

include:
  - docs

exclude:
  - patches
  - tools
  - installer
  - third_party
  - archiev
  - build
  - logs
  - tmp_nvda
  - CLAUDE.md
  - kdev.toml
  - "*.csproj"
  - "*.props"
  - "*.ps1"
  - "*.bat"
  - bin
  - obj
